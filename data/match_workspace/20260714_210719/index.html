<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football Betting OneShot｜赛事工作台</title><style>
:root{--bg:#07101b;--panel:#0d1928;--panel2:#122238;--line:#243a55;--text:#edf6ff;--muted:#8ea3b9;--cyan:#45d7c4;--blue:#5da8ff;--gold:#f5c45b;--red:#ff6b7a;--good:#48d597}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#12354c 0,transparent 31%),radial-gradient(circle at 90% 0,#1d2449 0,transparent 28%),var(--bg);color:var(--text);font:14px/1.55 "Microsoft YaHei",system-ui,sans-serif}.app{min-height:100vh;display:grid;grid-template-rows:auto auto 1fr}.top{display:flex;justify-content:space-between;gap:18px;padding:22px 28px;border-bottom:1px solid var(--line);background:#07101bd9;backdrop-filter:blur(15px)}h1{font-size:25px;margin:2px 0}.eyebrow{color:var(--cyan);letter-spacing:.12em;font-weight:800;font-size:12px}.top-meta{display:flex;gap:10px;align-items:center}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 11px;color:var(--muted)}.pill.good{color:var(--good);border-color:#267657}.toolbar{display:flex;gap:9px;padding:12px 28px;border-bottom:1px solid var(--line);background:#091421}.toolbar button,.toolbar input{border:1px solid var(--line);background:#0e1c2d;color:var(--text);border-radius:10px;padding:10px 13px}.toolbar button{cursor:pointer}.toolbar button.active{background:linear-gradient(105deg,#177d8b,#315da6);border-color:transparent}.toolbar input{flex:1}.main{display:grid;grid-template-columns:420px minmax(0,1fr);min-height:0}.list{border-right:1px solid var(--line);padding:16px;overflow:auto}.date-title{display:flex;justify-content:space-between;align-items:center;margin:0 2px 12px}.date-title h2{margin:0;font-size:17px}.match{width:100%;text-align:left;color:var(--text);background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer}.match.active{border-color:var(--cyan);box-shadow:0 0 0 2px #45d7c422}.match-head,.match-foot{display:flex;justify-content:space-between;gap:10px;align-items:center}.match h3{margin:9px 0 3px;font-size:17px}.match small{color:var(--muted)}.tag{font-size:11px;padding:3px 7px;border-radius:999px;background:#20334b;color:#c7d8e9}.tag.done{background:#174a3b;color:#7bf1bd}.tag.extra{background:#493816;color:#ffd779}.odds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:11px 0}.odds span{background:#091522;border-radius:8px;padding:7px;text-align:center;color:var(--muted)}.odds b{display:block;color:var(--text)}.viewer{min-width:0;display:grid;grid-template-rows:auto auto 1fr;padding:20px}.summary{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;margin-bottom:12px}.summary>div{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px}.summary label{display:block;color:var(--muted);font-size:11px}.summary b{display:block;margin-top:4px}.actions{display:flex;gap:8px;margin-bottom:12px}.actions button{border:1px solid var(--line);background:#102139;color:var(--text);border-radius:10px;padding:9px 12px;cursor:pointer}.actions button.primary{background:linear-gradient(105deg,#168a80,#2d68a7);border:0}.actions button.selected{background:#174a3b;color:#7bf1bd}.frame-wrap{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;min-height:650px}.frame-wrap iframe{width:100%;height:100%;min-height:650px;border:0;background:white}.empty{display:grid;place-items:center;height:100%;min-height:650px;color:var(--muted);text-align:center;padding:50px}.review-card{padding:24px}.review-card h2{margin-top:0}.review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.review-grid div{background:#091522;border-radius:10px;padding:12px}.review-grid label{display:block;color:var(--muted);font-size:11px}.notice{color:var(--gold)}@media(max-width:900px){.main{grid-template-columns:1fr}.list{border-right:0;max-height:430px}.summary{grid-template-columns:1fr}.top{padding:16px}.toolbar{padding:10px 16px}.viewer{padding:12px}.top-meta{display:none}}
</style></head><body><div class="app"><header class="top"><div><div class="eyebrow">FOOTBALL BETTING ONESHOT</div><h1>赛程 · 赛前分析 · 赛后复盘</h1><span id="subtitle"></span></div><div class="top-meta"><span class="pill good">只读分析</span><span class="pill" id="balance"></span><span class="pill">未明确锁单，不写入注单</span></div></header><nav class="toolbar"><button class="filter active" data-filter="all">全部赛程</button><button class="filter" data-filter="pending">未分析</button><button class="filter" data-filter="done">已分析</button><button class="filter" data-filter="selected">待分析清单</button><input id="search" placeholder="搜索球队、赛事或竞彩编号"></nav><main class="main"><aside class="list"><div class="date-title"><h2 id="dateTitle"></h2><span id="count"></span></div><div id="matches"></div></aside><section class="viewer"><div class="summary"><div><label>当前场次</label><b id="matchName">请选择一场比赛</b><span id="matchMeta"></span></div><div><label>模型主维度</label><b id="primary">—</b></div><div><label>执行状态</label><b id="betState">未锁单</b></div></div><div class="actions"><button class="primary" id="selectAnalysis">加入待分析</button><button id="showPrematch">赛前分析</button><button id="showReview">赛后复盘</button><button id="showAllReviews">复盘总表</button></div><div class="frame-wrap" id="content"><div class="empty">从左侧选择场次。<br>每天只更新体彩赛程，不会自动分析全部比赛。</div></div></section></main></div><script>
const DATA={"model_name": "Football Betting OneShot", "model_version": "v0.9.1", "balance": 51.43, "open_bets": [], "target_date": "2026-07-14", "generated_at": "2026-07-14T21:07:19.916579+08:00", "automatic_analysis": false, "automatic_betting": false, "requires_explicit_lock_confirmation": true, "lock_state_changed": false, "schedule_source": "data/schedule_updates/20260714_210646/20260714_210646_sporttery_2026-07-14.json", "matches": [{"id": "2040507", "match_num": "周二101", "home": "法国", "away": "西班牙", "league": "世界杯", "business_date": "2026-07-14", "kickoff": "2026-07-15 03:00", "spf": {"home": 2.08, "draw": 3.08, "away": 3.09}, "rqspf": {"handicap": -1, "home": 4.5, "draw": 3.65, "away": 1.58}, "official": true, "report_state": "已分析", "primary": "竞彩SPF主胜", "betting_state": "空仓｜未锁单", "report_url": "../analysis_reports/20260714_204522/20260714_204522_法国_vs_西班牙_盘口解析.html", "review": null}, {"id": "2040511", "match_num": "周二201", "home": "杰尔", "away": "雷克维京", "league": "欧冠", "business_date": "2026-07-14", "kickoff": "2026-07-15 01:00", "spf": {"home": 1.44, "draw": 4.4, "away": 4.81}, "rqspf": {"handicap": -1, "home": 2.63, "draw": 3.08, "away": 2.36}, "official": true, "report_state": "已分析", "primary": "竞彩SPF主胜", "betting_state": "空仓｜未锁单", "report_url": "../analysis_reports/20260714_204527/20260714_204527_杰尔_vs_雷克雅未克维京人_盘口解析.html", "review": null}, {"id": "2040512", "match_num": "周二202", "home": "新圣徒", "away": "萨巴赫", "league": "欧冠", "business_date": "2026-07-14", "kickoff": "2026-07-15 01:30", "spf": {"home": 5.4, "draw": 4.25, "away": 1.41}, "rqspf": {"handicap": 1, "home": 2.43, "draw": 3.12, "away": 2.52}, "official": true, "report_state": "已分析", "primary": "竞彩SPF主胜", "betting_state": "空仓｜未锁单", "report_url": "../analysis_reports/20260714_204532/20260714_204532_新圣徒_vs_萨巴赫_盘口解析.html", "review": null}], "postmatch_dashboard_url": "../postmatch_dashboard/latest.html"};let current=null,mode='all',selected=JSON.parse(localStorage.getItem('fbos-analysis-selections')||'[]');const $=s=>document.querySelector(s);$('#subtitle').textContent=`${DATA.model_version} · 体彩业务日 ${DATA.target_date} · 更新 ${new Date(DATA.generated_at).toLocaleString()}`;$('#balance').textContent=`余额 ¥${Number(DATA.balance||0).toFixed(2)}`;$('#dateTitle').textContent=`${DATA.target_date} 体彩赛程`;
const key=m=>String(m.id);const isSelected=m=>selected.some(x=>String(x.id)===key(m));function saveSelection(m){if(!isSelected(m))selected.push({id:m.id,match_num:m.match_num,home:m.home,away:m.away,league:m.league,kickoff:m.kickoff,selected_at:new Date().toISOString(),analysis_requested:false});localStorage.setItem('fbos-analysis-selections',JSON.stringify(selected));fetch('/v1/analysis-selections',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({match:m})}).catch(()=>{});render();show(m)}
function card(m){const spf=m.spf||{};return `<button class="match ${current&&key(current)===key(m)?'active':''}" data-id="${key(m)}"><div class="match-head"><span>${m.match_num||'—'} · ${m.league||'—'}</span><span class="tag ${m.report_state==='已分析'?'done':m.official?'':'extra'}">${m.report_state}${m.official?'':' · 额外'}</span></div><h3>${m.home} <small>vs</small> ${m.away}</h3><small>${m.kickoff||'—'}</small><div class="odds"><span>胜<b>${spf.home??'—'}</b></span><span>平<b>${spf.draw??'—'}</b></span><span>负<b>${spf.away??'—'}</b></span></div><div class="match-foot"><small>${isSelected(m)?'✓ 已加入待分析':'未选择分析'}</small><small>${m.betting_state}</small></div></button>`}
function render(){const q=$('#search').value.trim().toLowerCase();const rows=DATA.matches.filter(m=>(!q||JSON.stringify(m).toLowerCase().includes(q))&&(mode==='all'||mode==='pending'&&m.report_state!=='已分析'||mode==='done'&&m.report_state==='已分析'||mode==='selected'&&isSelected(m)));$('#matches').innerHTML=rows.map(card).join('')||'<div class="empty">没有符合条件的场次</div>';$('#count').textContent=`${rows.length} 场`;document.querySelectorAll('.match').forEach(b=>b.onclick=()=>show(DATA.matches.find(m=>key(m)===b.dataset.id)))}
function empty(text){$('#content').innerHTML=`<div class="empty">${text}</div>`}function show(m){current=m;render();$('#matchName').textContent=`${m.home} vs ${m.away}`;$('#matchMeta').textContent=`${m.match_num||'—'} · ${m.league||'—'} · ${m.kickoff||'—'}`;$('#primary').textContent=m.primary;$('#betState').textContent=m.betting_state;$('#selectAnalysis').textContent=isSelected(m)?'✓ 已加入待分析':'加入待分析';$('#selectAnalysis').classList.toggle('selected',isSelected(m));showPrematch()}
function showPrematch(){if(!current)return;if(!current.report_url)return empty('该场尚未分析。点击“加入待分析”后，再由你明确要求模型分析。');$('#content').innerHTML=`<iframe title="赛前分析" src="${current.report_url}"></iframe>`}function showReview(){if(!current)return;const r=current.review;if(!r)return empty('该场尚未生成赛后复盘；比赛结束后的单次复盘任务会更新这里。');$('#content').innerHTML=`<div class="review-card"><h2>${r['赛事与对阵']||current.home+' vs '+current.away}</h2><div class="review-grid"><div><label>实际90分钟比分</label><b>${r['实际90分钟比分']||'—'}</b></div><div><label>主维度是否命中</label><b>${r['主维度是否命中']||'—'}</b></div><div><label>赛前首推主维度</label><b>${r['赛前首推主维度']||'—'}</b></div><div><label>红黑与模型逻辑分类</label><b>${r['红黑与模型逻辑分类']||'—'}</b></div></div><p>${r['复盘摘要']||''}</p><p class="notice">本页按90分钟赛果口径；未锁单场次只复盘模型，不制造注单盈亏。</p></div>`}function showAllReviews(){$('#content').innerHTML=`<iframe title="复盘总表" src="${DATA.postmatch_dashboard_url}"></iframe>`}
$('#selectAnalysis').onclick=()=>current&&saveSelection(current);$('#showPrematch').onclick=showPrematch;$('#showReview').onclick=showReview;$('#showAllReviews').onclick=showAllReviews;$('#search').oninput=render;document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{mode=b.dataset.filter;document.querySelectorAll('.filter').forEach(x=>x.classList.toggle('active',x===b));render()});render();if(DATA.matches.length)show(DATA.matches[0]);
</script></body></html>
