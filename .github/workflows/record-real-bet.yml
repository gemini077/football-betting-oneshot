name: Record confirmed real bet
on:
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
jobs:
  record:
    if: startsWith(github.event.issue.title, '[已下单]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate and record
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/record_real_bet.py
      - name: Rebuild pages
        run: |
          pip install openpyxl
          python scripts/match_workspace.py
          python scripts/build_public_site.py
      - name: Commit result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/real_bets data/match_workspace data/public_site
          git commit -m "record confirmed real bet #${{ github.event.issue.number }}" || exit 0
          git stash push --include-untracked -m "ci-transient-untracked-files" || true
          git pull --rebase origin main
          git push
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: '已按你输入的实际赔率和金额登记为真实注单。'});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
