name: Analyze selected match
run-name: Analyze selected ${{ inputs.request_id || github.event.issue.number }}

on:
  workflow_dispatch:
    inputs:
      business_date:
        description: Sporttery business date (YYYY-MM-DD)
        required: true
      match_id:
        description: Match ID from the workspace
        required: false
      match:
        description: Match name, for example England vs Argentina
        required: true
      request_id:
        description: Persistent local queue request ID
        required: false
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: football-betting-oneshot-selected-analysis
  cancel-in-progress: false

jobs:
  analyze:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.login == github.repository_owner &&
       startsWith(github.event.issue.title, '[自动分析]'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Fetch, analyze and rebuild
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "analysis attempt ${attempt}/3"
            if python scripts/deepseek_auto_analysis.py --event "$GITHUB_EVENT_PATH"; then
              exit 0
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "evidence was incomplete; retrying after 45 seconds"
              sleep 45
            fi
          done
          echo "analysis failed after 3 evidence refresh attempts" >&2
          exit 1

      - name: Save generated analysis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fetch_runs data/analysis_inputs/automated data/analysis_reports data/live_ev_profiles data/market_history data/match_archive data/postmatch_automation data/match_workspace data/paper_ledger
          if ! git diff --cached --quiet; then
            git commit -m "analyze selected football match [skip ci]"
            git push
          fi

      - name: Persist failure diagnostics
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analysis_jobs/diagnostics data/fetch_runs data/provider_match_crosswalk.json || true
          if ! git diff --cached --quiet; then
            git commit -m "diagnose failed football analysis [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Close completed request
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "自动分析已完成并部署到主页。"
          gh issue close "${{ github.event.issue.number }}"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
