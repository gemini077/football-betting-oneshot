name: Refresh analyzed pre-match markets
on:
  workflow_dispatch:
  repository_dispatch:
    types: [prematch_checkpoint_due]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: prematch-checkpoint-write
  cancel-in-progress: false
jobs:
  refresh-due-markets:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Check whether an analyzed match reached a new checkpoint
        id: due
        shell: bash
        env:
          TARGET_MATCH_ID: ${{ github.event.client_payload.match_id }}
          TARGET_CHECKPOINT: ${{ github.event.client_payload.checkpoint }}
        run: |
          args=(--count-due)
          [[ -n "$TARGET_MATCH_ID" ]] && args+=(--match-id "$TARGET_MATCH_ID")
          [[ -n "$TARGET_CHECKPOINT" ]] && args+=(--checkpoint "$TARGET_CHECKPOINT")
          echo "count=$(python scripts/prematch_market_monitor.py "${args[@]}")" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.due.outputs.count != '0'
        with:
          python-version: "3.12"
          cache: pip
      - if: steps.due.outputs.count != '0'
        run: pip install -r requirements.txt
      - name: Refresh analyzed matches at the eight pre-match checkpoints
        if: steps.due.outputs.count != '0'
        continue-on-error: true
        env:
          TARGET_MATCH_ID: ${{ github.event.client_payload.match_id }}
          TARGET_CHECKPOINT: ${{ github.event.client_payload.checkpoint }}
        run: |
          args=()
          [[ -n "$TARGET_MATCH_ID" ]] && args+=(--match-id "$TARGET_MATCH_ID")
          [[ -n "$TARGET_CHECKPOINT" ]] && args+=(--checkpoint "$TARGET_CHECKPOINT")
          python scripts/prematch_market_monitor.py "${args[@]}"
      - name: Rebuild the workspace from durable checkpoint state
        if: steps.due.outputs.count != '0'
        run: |
          python scripts/match_workspace.py
          python scripts/build_public_site.py
      - name: Save market snapshots and refreshed reports
        if: steps.due.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # site/ is an ignored build artifact and is uploaded below; only
          # durable source/report data belongs in the repository commit.
          git add data/fetch_runs data/market_history data/analysis_inputs data/analysis_reports data/match_workspace
          if ! git diff --cached --quiet; then
            git commit -m "refresh due pre-match markets [skip ci]"
            git stash push --include-untracked -m "ci-transient-untracked-files" || true
            git pull --rebase origin main
            git push
          fi
      - uses: actions/configure-pages@v5
        if: steps.due.outputs.count != '0'
      - uses: actions/upload-pages-artifact@v3
        if: steps.due.outputs.count != '0'
        with:
          path: site
      - id: deployment
        if: steps.due.outputs.count != '0'
        uses: actions/deploy-pages@v4
