name: Refresh analyzed pre-match markets
on:
  workflow_dispatch:
  schedule:
    # Offset from the crowded top-of-hour boundary; GitHub may still queue
    # scheduled jobs, so the monitor records actual capture time and lateness.
    - cron: "2-59/5 * * * *"
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: football-betting-oneshot-write
  cancel-in-progress: false
jobs:
  refresh-due-markets:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Check whether an analyzed match reached a new checkpoint
        id: due
        shell: bash
        run: echo "count=$(python scripts/prematch_market_monitor.py --count-due)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.due.outputs.count != '0'
        with:
          python-version: "3.12"
          cache: pip
      - if: steps.due.outputs.count != '0'
        run: pip install -r requirements.txt
      - name: Refresh analyzed matches at the eight pre-match checkpoints
        if: steps.due.outputs.count != '0'
        run: python scripts/prematch_market_monitor.py
      - name: Save market snapshots and refreshed reports
        if: steps.due.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # site/ is an ignored build artifact and is uploaded below; only
          # durable source/report data belongs in the repository commit.
          git add .github/workflows/postmatch-once.yml data/fetch_runs data/market_history data/analysis_inputs data/analysis_reports data/live_ev_profiles data/postmatch_automation data/match_workspace
          if ! git diff --cached --quiet; then
            git commit -m "refresh due pre-match markets [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
        if: steps.due.outputs.count != '0'
      - uses: actions/upload-pages-artifact@v3
        if: steps.due.outputs.count != '0'
        with:
          path: site
      - id: deployment
        if: steps.due.outputs.count != '0'
        uses: actions/deploy-pages@v4
