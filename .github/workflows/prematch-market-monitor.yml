name: Refresh analyzed pre-match markets
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: football-betting-oneshot-write
  cancel-in-progress: false
jobs:
  refresh-due-markets:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh only analyzed matches within six hours of kickoff
        run: python scripts/prematch_market_monitor.py
      - name: Run model checks
        run: python -m pytest -q
      - name: Save market snapshots and refreshed reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fetch_runs data/market_history data/analysis_reports data/live_ev_profiles data/postmatch_automation data/match_workspace site
          if ! git diff --cached --quiet; then
            git commit -m "refresh due pre-match markets [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
