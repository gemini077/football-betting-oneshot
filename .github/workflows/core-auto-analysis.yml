name: Core event automatic reports

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: football-betting-oneshot-core-auto
  cancel-in-progress: false

jobs:
  analyze-core-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate at most two pending core reports
        run: python scripts/core_auto_reports.py --max-jobs 2
      - name: Save reports and queue state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analysis_jobs data/fetch_runs data/analysis_inputs/automated data/analysis_reports data/live_ev_profiles data/market_history data/match_archive data/match_workspace data/provider_match_crosswalk.json site || true
          if ! git diff --cached --quiet; then
            git commit -m "auto-analyze core football events [skip ci]"
            git pull --rebase origin main
            git push
          fi
