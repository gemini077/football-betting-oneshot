name: Core event automatic reports

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: football-betting-oneshot-write
  cancel-in-progress: false

jobs:
  analyze-core-events:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate at most two pending core reports
        run: python scripts/core_auto_reports.py --max-jobs 2
      - name: Save reports and queue state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- data
          if ! git diff --cached --quiet; then
            git commit -m "auto-analyze core football events [skip ci]"
            git stash push --include-untracked -m "ci-transient-untracked-files" || true
            git pull --rebase origin main
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
