name: Refresh data and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Deterministic maintenance only; no LLM/API token use.
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: football-betting-oneshot-write
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve China business date
        shell: bash
        run: echo "FBOS_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"

      - name: Refresh due schedule, market and post-match work
        run: python scripts/automation_cycle.py --date "$FBOS_DATE"

      - name: Save generated public data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/schedule_updates data/match_workspace data/fetch_runs data/market_history data/match_archive data/analysis_inputs data/analysis_reports data/live_ev_profiles data/postmatch_automation data/postmatch_reviews data/postmatch_dashboard data/paper_ledger
          if ! git diff --cached --quiet; then
            git commit -m "refresh public football data [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
